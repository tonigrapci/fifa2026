<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="World Cup Schedule" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="assets/app-icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <title>World Cup Schedule</title>
  <style>
    :root {
      --slate-950:#020617; --slate-900:#0f172a; --slate-700:#334155; --slate-600:#475569;
      --slate-500:#64748b; --slate-400:#94a3b8; --slate-300:#cbd5e1; --slate-200:#e2e8f0;
      --slate-100:#f1f5f9; --slate-50:#f8fafc; --white:#fff;
      --blue-50:#eff6ff; --blue-300:#93c5fd; --blue-600:#2563eb;
      --yellow-50:#fefce8; --yellow-300:#fde047;
      --green-50:#f0fdf4; --green-300:#86efac; --emerald-300:#6ee7b7; --emerald-600:#059669;
      --red-50:#fef2f2; --red-100:#fee2e2; --red-200:#fecaca; --red-400:#f87171; --red-600:#dc2626; --red-700:#b91c1c;
      --purple-100:#f3e8ff; --purple-700:#7e22ce;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--slate-100); color:var(--slate-900); }
    button, input, textarea, select { font: inherit; }
    button { cursor:pointer; }
    .page { min-height:100vh; padding:16px; }
    .wrap { max-width:1280px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
    .hero { background:var(--slate-950); color:white; border-radius:22px; padding:16px 18px; box-shadow:0 1px 8px rgba(15,23,42,.08); }
    .hero-inner { display:flex; align-items:center; justify-content:center; gap:12px; text-align:center; }
    h1 { margin:0; font-size: clamp(1.45rem, 4vw, 2.2rem); line-height:1; }
    .toolbar { background:white; border:1px solid var(--slate-200); border-radius:28px; padding:16px; box-shadow:0 1px 6px rgba(15,23,42,.05); transition:border-radius .2s ease, box-shadow .2s ease, padding .2s ease; }
    .toolbar.sticky { position:sticky; top:12px; z-index:30; }
    .toolbar .hero { margin-bottom:12px; }
    .toolbar-summary { display:flex; align-items:center; justify-content:space-between; gap:12px; width:100%; margin-top:12px; padding-top:12px; border-top:1px solid var(--slate-200); }
    .toolbar-summary-main { min-width:0; display:flex; align-items:center; gap:8px; }
    .toolbar-row { display:flex; flex-direction:column; gap:12px; }
    .mobile-controls-toggle { display:none; }
    .chevron-icon { width:10px; height:10px; border-right:2px solid currentColor; border-bottom:2px solid currentColor; transform:translateY(-2px) rotate(45deg); transition:transform .18s ease; }
    .mobile-controls-toggle.open .chevron-icon { transform:translateY(2px) rotate(225deg); }
    .controls-tray { display:flex; flex-direction:column; gap:0; }
    .searchbox { position:relative; width:100%; }
    .searchbox span { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--blue-600); font-size:25px; }
    input[type="search"], input[type="text"], input[type="date"], input[type="time"], textarea, select {
      width:100%; border:1px solid var(--slate-200); border-radius:14px; padding:10px 12px; outline:none; background:white;
    }
    input[type="search"] { padding:14px 14px 14px 44px; border:2px solid var(--slate-900); border-radius:18px; font-size:16px; font-weight:700; box-shadow:0 8px 20px rgba(15,23,42,.08); }
    input[type="search"]:focus { border-color:var(--blue-600); box-shadow:0 0 0 4px rgba(37,99,235,.12), 0 8px 20px rgba(15,23,42,.08); }
    .controls { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .view-toggle { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:4px; padding:4px; background:var(--slate-100); border:1px solid var(--slate-200); border-radius:18px; }
    .view-toggle .btn { justify-content:center; border-color:transparent; border-radius:14px; padding:9px 8px; background:transparent; }
    .view-toggle .btn.active { background:var(--slate-950); color:white; box-shadow:0 2px 8px rgba(15,23,42,.16); }
    .btn, .file-label { border:1px solid var(--slate-200); background:white; color:var(--slate-900); border-radius:16px; padding:9px 14px; font-weight:700; display:inline-flex; align-items:center; gap:8px; text-decoration:none; }
    .icon-btn { width:34px; height:34px; padding:0; justify-content:center; border-radius:999px; color:var(--slate-500); }
    .icon-btn:hover { color:var(--slate-950); border-color:var(--slate-300); }
    .btn.active { background:var(--slate-950); color:white; }
    .btn.primary { background:var(--slate-950); color:white; border-color:var(--slate-950); }
    .btn.green { background:var(--emerald-600); color:white; border-color:var(--emerald-600); }
    .detail-panel { margin-top:12px; }
    .settings-grid { display:grid; grid-template-columns:1fr; gap:12px; margin-bottom:12px; }
    .setting-card { background:white; border:1px solid var(--slate-200); border-radius:16px; padding:12px; }
    .setting-card label { display:block; }
    .timezone-button { width:100%; border:0; background:white; padding:0; display:flex; justify-content:space-between; align-items:center; gap:12px; text-align:left; }
    .timezone-button span { color:var(--slate-600); font-size:13px; font-weight:900; }
    .timezone-button strong { font-size:18px; }
    .timezone-picker { margin-top:12px; border-top:1px solid var(--slate-200); padding-top:12px; }
    .timezone-search { width:100%; border:1px solid var(--slate-200); border-radius:14px; padding:10px 12px; outline:none; background:white; font-weight:700; }
    .timezone-list { margin-top:10px; max-height:260px; overflow:auto; display:flex; flex-direction:column; gap:6px; }
    .timezone-option { width:100%; border:1px solid var(--slate-200); background:white; border-radius:12px; padding:10px 12px; display:flex; flex-direction:column; gap:2px; text-align:left; }
    .timezone-option strong { font-size:14px; }
    .timezone-option span { color:var(--slate-500); font-size:12px; }
    .timezone-option.active { border-color:var(--slate-950); background:var(--slate-950); color:white; }
    .timezone-option.active span { color:var(--slate-300); }
    .legend { display:flex; flex-wrap:wrap; gap:12px; color:var(--slate-600); font-size:14px; }
    .swatch { display:inline-block; width:16px; height:16px; border-radius:4px; vertical-align:middle; margin-right:4px; border:1px solid var(--slate-200); }
    .backup { margin-top:14px; background:var(--slate-50); border:1px solid var(--slate-200); border-radius:18px; padding:14px; font-size:14px; }
    .backup textarea { width:100%; min-height:140px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; }
    .detail-actions { display:grid; gap:10px; }
    .simple-share-card { background:white; border:1px solid var(--slate-200); border-radius:16px; padding:12px; }
    .simple-share-card .btn { width:100%; justify-content:center; }
    .share-copy { min-width:0; }
    .share-copy strong { display:block; font-size:14px; }
    .share-copy span { display:block; color:var(--slate-600); font-size:12px; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .share-actions { margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; }
    .share-status { margin-top:8px; color:var(--emerald-600); font-size:13px; font-weight:800; }
    .grid2 { display:grid; grid-template-columns:1fr; gap:12px; }
    .hidden { display:none !important; }
    .event-row, .event-card, .mini { width:100%; text-align:left; border:1px solid var(--slate-200); border-radius:24px; padding:16px; box-shadow:0 1px 5px rgba(15,23,42,.05); transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
    .event-row:hover, .event-card:hover, .mini:hover { transform:translateY(-1px); box-shadow:0 8px 18px rgba(15,23,42,.08); }
    .event-row-inner { display:flex; flex-direction:column; gap:12px; justify-content:space-between; }
    .badges { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
    .badge { display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding:4px 8px; font-size:12px; font-weight:800; }
    .badge.dark { background:var(--slate-950); color:white; }
    .badge.light { background:var(--slate-100); color:var(--slate-700); }
    .badge.must { background:var(--red-100); color:var(--red-700); border:1px solid var(--red-200); }
    .badge.live { background:var(--red-100); color:var(--red-700); border:1px solid var(--red-200); }
    .badge.replay { background:var(--blue-50); color:var(--blue-600); border:1px solid var(--blue-300); }
    .badge.skip { background:var(--slate-200); color:var(--slate-700); border:1px solid var(--slate-300); }
    .event-title { margin:8px 0 4px; font-size:20px; font-weight:900; }
    .flag-title { display:flex; align-items:center; flex-wrap:wrap; gap:8px; }
    .team-name { display:inline-flex; align-items:center; gap:5px; min-width:0; }
    .team-flag { width:22px; height:16px; border-radius:3px; object-fit:cover; box-shadow:0 0 0 1px rgba(15,23,42,.12); background:white; flex:0 0 auto; }
    .team-flag-emoji { font-size:22px; line-height:1; filter:saturate(.95); }
    .flag-vs { color:var(--slate-500); font-size:14px; font-weight:900; text-transform:uppercase; }
    .meta { color:var(--slate-600); font-size:14px; }
    .notes { margin-top:10px; background:rgba(255,255,255,.7); border-radius:16px; padding:10px; color:var(--slate-700); }
    .big-time { font-size:28px; font-weight:900; text-align:right; }
    .score-pill { display:inline-flex; align-items:center; justify-content:center; border-radius:14px; padding:6px 10px; background:var(--slate-950); color:white; font-size:13px; font-weight:900; white-space:nowrap; }
    .score-pill.light { background:var(--slate-100); color:var(--slate-700); border:1px solid var(--slate-200); }
    .completed-label { display:inline-flex; align-items:center; border-radius:999px; padding:3px 8px; background:var(--slate-100); color:var(--slate-500); font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.04em; }
    .event-row.is-past, .event-card.is-past, .mini.is-past { filter:saturate(.55); opacity:.68; }
    .event-row.is-past:hover, .event-card.is-past:hover, .mini.is-past:hover { opacity:.86; }
    .bg-mustWatch { background:var(--red-50); border-color:var(--red-400); box-shadow:0 0 0 2px var(--red-200), 0 1px 5px rgba(15,23,42,.05); }
    .bg-weekend { background:var(--green-50); border-color:var(--green-300); }
    .bg-early { background:var(--blue-50); border-color:var(--blue-300); }
    .bg-morning { background:var(--yellow-50); border-color:var(--yellow-300); }
    .bg-other { background:white; border-color:var(--slate-200); }
    .day-block { background:white; border:1px solid var(--slate-200); border-radius:28px; overflow:hidden; box-shadow:0 1px 5px rgba(15,23,42,.05); }
    .day-head { background:var(--slate-950); color:white; padding:12px 20px; font-weight:900; }
    .day-block.past-day { background:var(--slate-50); border-color:var(--slate-200); }
    .day-block.past-day .day-head { background:var(--slate-700); color:var(--slate-100); }
    .day-block.next-day { box-shadow:0 0 0 2px rgba(37,99,235,.18), 0 8px 22px rgba(15,23,42,.08); }
    .day-head-inner { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .day-grid { display:grid; grid-template-columns:1fr; gap:12px; padding:16px; }
    .cal-nav { display:flex; flex-direction:column; gap:12px; align-items:center; justify-content:space-between; background:white; border:1px solid var(--slate-200); border-radius:28px; padding:16px; box-shadow:0 1px 5px rgba(15,23,42,.05); }
    .cal-title { font-size:20px; font-weight:900; text-align:center; }
    .week { background:white; border:1px solid var(--slate-200); border-radius:28px; overflow:hidden; box-shadow:0 1px 5px rgba(15,23,42,.05); }
    .week-head, .month-head { display:grid; grid-template-columns:repeat(7,1fr); background:var(--slate-950); color:white; }
    .week-head > div, .month-head > div { padding:10px; text-align:center; font-weight:900; border-right:1px solid rgba(255,255,255,.1); }
    .week-grid { display:grid; grid-template-columns:1fr; }
    .week-day { min-height:180px; border-top:1px solid var(--slate-200); padding:8px; }
    .month { background:white; border:1px solid var(--slate-200); border-radius:28px; overflow:hidden; box-shadow:0 1px 5px rgba(15,23,42,.05); }
    .month-grid { display:grid; grid-template-columns:repeat(7,1fr); }
    .month-day { min-height:190px; border-top:1px solid var(--slate-200); border-right:1px solid var(--slate-200); padding:8px; overflow:hidden; }
    .month-day.muted { background:var(--slate-50); color:var(--slate-400); }
    .day-num { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .count-pill { background:var(--slate-100); color:var(--slate-600); border-radius:999px; padding:2px 8px; font-size:10px; font-weight:900; }
    .mini { border-radius:12px; padding:5px 7px; margin-bottom:4px; font-size:12px; box-shadow:none; }
    .mini-top { display:flex; align-items:center; justify-content:space-between; gap:4px; }
    .mini-time { font-size:11px; font-weight:900; white-space:nowrap; }
    .mini-title { font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mini-title .team-name { gap:3px; }
    .mini-title .team-flag { width:16px; height:12px; }
    .status-dot { display:inline-block; width:10px; height:10px; border-radius:999px; flex:0 0 auto; box-shadow:0 0 0 3px rgba(255,255,255,.8); }
    .status-live { background:var(--red-600); }
    .status-replay { background:var(--blue-600); }
    .status-skip { background:var(--slate-400); }
    .time-stack { display:flex; align-items:center; justify-content:flex-end; gap:8px; }
    .star { color:var(--red-700); font-size:13px; }
    .modal { position:fixed; inset:0; z-index:80; background:rgba(2,6,23,.65); display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal-card { width:100%; max-width:720px; background:white; border-radius:28px; overflow:hidden; box-shadow:0 30px 80px rgba(2,6,23,.35); }
    .modal-head { background:var(--slate-950); color:white; padding:20px; }
    .modal-head .small { color:var(--emerald-300); letter-spacing:.2em; text-transform:uppercase; font-size:12px; font-weight:800; }
    .modal-head h2 { margin:4px 0 0; }
    .match-summary { background:var(--slate-50); border:1px solid var(--slate-200); border-radius:18px; padding:14px; color:var(--slate-700); display:grid; grid-template-columns:minmax(0,1fr) minmax(220px,.9fr); gap:14px; align-items:center; }
    .match-teams { min-width:0; }
    .match-teams strong { display:block; color:var(--slate-950); font-size:16px; }
    .match-teams .flag-title { margin-top:6px; }
    .match-facts { display:grid; gap:7px; }
    .match-fact { display:grid; grid-template-columns:56px minmax(0,1fr); gap:10px; align-items:baseline; text-align:right; }
    .match-fact span { color:var(--slate-500); font-size:11px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    .match-fact strong { min-width:0; color:var(--slate-950); font-size:13px; line-height:1.25; overflow-wrap:anywhere; }
    .form { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:20px; }
    .span2 { grid-column: span 2; }
    label { font-size:14px; font-weight:800; }
    label > input, label > textarea, label > select { margin-top:6px; font-weight:400; }
    .notes-editor textarea { min-height:96px; resize:vertical; }
    .quick-toggles { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .checkrow { display:flex; align-items:center; gap:8px; }
    .toggle-card { border:1px solid var(--slate-200); border-radius:16px; padding:12px; background:var(--slate-50); }
    .status-card { border:1px solid var(--slate-200); border-radius:16px; padding:10px 12px; background:var(--slate-50); }
    .status-card span { display:block; color:var(--slate-600); font-size:12px; font-weight:900; margin-bottom:6px; }
    .status-card select { margin:0; border-color:var(--slate-300); font-weight:800; }
    .modal-actions { background:var(--slate-50); padding:18px; display:flex; flex-direction:column-reverse; gap:8px; justify-content:space-between; }
    .right-actions { display:flex; gap:8px; justify-content:flex-end; }
    .empty { border:1px dashed var(--slate-300); border-radius:12px; color:var(--slate-400); padding:12px; font-size:12px; }
    .test-grid { display:grid; grid-template-columns:1fr; gap:8px; }
    .test-pass { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; border-radius:12px; padding:8px; }
    .test-fail { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; border-radius:12px; padding:8px; }
    @media (min-width: 768px) {
      .page { padding:32px; }
      .settings-grid { grid-template-columns:minmax(220px, 320px) 1fr; align-items:start; }
      .searchbox { max-width:100%; }
      .grid2 { grid-template-columns:repeat(2,1fr); }
      .day-grid { grid-template-columns:repeat(2,1fr); }
      .event-row-inner { flex-direction:row; align-items:center; }
      .week-grid { grid-template-columns:repeat(7,1fr); }
      .week-day { border-right:1px solid var(--slate-200); }
      .cal-nav { flex-direction:row; }
      .modal-actions { flex-direction:row; align-items:center; }
    }
    @media (min-width: 1100px) { .day-grid { grid-template-columns:repeat(3,1fr); } }
    @media (max-width: 700px) {
      .page { padding:12px; }
      .wrap { gap:14px; }
      .hero { border-radius:18px; padding:14px 16px; }
      .toolbar { border-radius:0 0 20px 20px; padding:10px; margin-left:-12px; margin-right:-12px; border-left:0; border-right:0; }
      .toolbar .hero { margin-bottom:10px; }
      body.mobile-sticky-view .toolbar.sticky { position:fixed; top:0; left:0; right:0; margin:0; border-radius:0 0 20px 20px; border-left:0; border-right:0; }
      body.mobile-sticky-view .toolbar.sticky + #results { padding-top:168px; }
      .mobile-controls-toggle { display:flex; align-items:center; justify-content:center; width:44px; height:24px; border:1px solid var(--slate-200); border-radius:999px; background:var(--slate-50); color:var(--slate-600); margin:8px auto 0; box-shadow:0 1px 4px rgba(15,23,42,.06); transition:background .18s ease, color .18s ease, border-color .18s ease, box-shadow .18s ease; }
      .mobile-controls-toggle.open { background:var(--slate-950); border-color:var(--slate-950); color:white; box-shadow:0 4px 12px rgba(15,23,42,.18); }
      .controls-tray { display:none; overflow:hidden; }
      body.mobile-controls-open .controls-tray { display:flex; opacity:1; transform:translateY(0); pointer-events:auto; }
      .toolbar.sticky { box-shadow:0 8px 22px rgba(15,23,42,.08); }
      body.list-scrolled .toolbar.sticky { padding-top:8px; padding-bottom:8px; box-shadow:0 8px 22px rgba(15,23,42,.1); }
      body.list-scrolled input[type="search"] { padding-top:12px; padding-bottom:12px; border-radius:16px; box-shadow:0 4px 14px rgba(15,23,42,.08); }
      .toolbar-summary { gap:10px; margin-top:10px; padding-top:10px; }
      .toolbar-summary-text { min-width:0; color:var(--slate-600); font-size:13px; font-weight:800; line-height:1.25; }
      .toolbar-summary .btn { flex:0 0 auto; padding:8px 10px; border-radius:14px; }
      .controls { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); align-items:stretch; }
      .controls .btn, .controls .file-label, .controls select { width:100%; min-width:0; justify-content:center; }
      .view-toggle { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .legend { font-size:12px; gap:8px; }
      .simple-share-card { padding:10px; }
      .modal { align-items:flex-start; overflow:auto; padding:10px; }
      .modal-card { border-radius:20px; max-height:calc(100dvh - 20px); overflow:auto; }
      .modal-head { padding:14px 16px; }
      .modal-head h2 { font-size:20px; line-height:1.1; }
      .form { gap:10px; padding:14px; }
      .match-summary { padding:12px; grid-template-columns:1fr; gap:12px; }
      .match-fact { grid-template-columns:48px minmax(0,1fr); text-align:left; }
      .notes-editor textarea { min-height:82px; }
      .modal-actions { padding:12px; }
      .right-actions { display:grid; grid-template-columns:1fr 1fr; }
      .modal-actions > .btn { width:100%; justify-content:center; }
      .month { overflow-x:auto; }
      .month-head, .month-grid { min-width:900px; }
      .month .mini-title { display:flex; align-items:center; justify-content:center; gap:4px; overflow:visible; text-overflow:clip; }
      .month .mini-title .team-name { gap:0; }
      .month .mini-title .team-name > span:not(.team-flag-emoji) { display:none; }
      .month .mini-title .team-flag { width:20px; height:14px; }
      .month .mini-title .team-flag-emoji { font-size:20px; }
      .month .mini-title .flag-vs { font-size:10px; }
      .week { overflow-x:auto; }
      .week-head, .week-grid { min-width:900px; }

    function runSelfTests() {
      const results = [];
      const test = (name, pass) => results.push({name, pass: Boolean(pass)});
      test("loads 104 matches", BASE_MATCHES.length === 104);
      test("12:00am is blue window", colourGroup({date:"2026-06-15", time:"00:00"}) === "early");
      test("4:55am is blue window", colourGroup({date:"2026-06-15", time:"04:55"}) === "early");
      test("5:00am is yellow window", colourGroup({date:"2026-06-15", time:"05:00"}) === "morning");
      test("10:00am is yellow window", colourGroup({date:"2026-06-15", time:"10:00"}) === "morning");
      test("10:30am has no blue/yellow", colourGroup({date:"2026-06-15", time:"10:30"}) === "other");
      test("Friday 6pm is weekend green", colourGroup({date:"2026-06-12", time:"18:00"}) === "weekend");
      test("Sunday 11:30pm is weekend green", colourGroup({date:"2026-06-14", time:"23:30"}) === "weekend");
      test("must watch overrides all colour groups", colourGroup({date:"2026-06-14", time:"05:00", mustWatch:true}) === "mustWatch");
      test("Australia match searchable data exists", BASE_MATCHES.some(m => `${m.home} ${m.away}`.includes("Australia")));
      return results;

    function scheduleDayAutoScroll() {
      if (state.view !== "days" || state.query || state.selectedId || state.autoScrolledDays) return;
      state.autoScrolledDays = true;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          updateScrollState();
          const target = document.querySelector('[data-scroll-target="true"]');
          if (!target) return;
          const stickyToolbar = document.querySelector(".toolbar.sticky");
          const offset = window.matchMedia("(max-width: 700px)").matches && stickyToolbar ? stickyToolbar.getBoundingClientRect().height + 12 : 16;
          const top = target.getBoundingClientRect().top + window.scrollY - offset;
          window.scrollTo({ top: Math.max(0, top), behavior: "auto" });
        });
      });
    }

      const isAgenda = state.view === "agenda";

      const isMobileAgenda = isAgenda && window.matchMedia("(max-width: 700px)").matches;
      document.body.classList.toggle("details-closed", !state.mobileDetailsOpen);
      document.body.classList.toggle("details-open", state.mobileDetailsOpen);

      document.body.classList.toggle("agenda-filters-open", isAgenda && state.mobileAgendaOpen);
      document.body.classList.toggle("mobile-agenda-closed", isMobileAgenda && !state.mobileAgendaOpen);
      document.body.classList.toggle("mobile-agenda-open", isMobileAgenda && state.mobileAgendaOpen);
      if (!isAgenda) {
        document.body.classList.remove("agenda-filters-closed", "agenda-filters-open");
      }
      if (!isMobileAgenda) {
        document.body.classList.remove("mobile-agenda-closed", "mobile-agenda-open");
      }
      document.body.classList.toggle("mobile-sticky-view", isMobileStickyView);
      if (!mobileAgendaBound) {
        mobileAgendaBound = true;
        window.addEventListener("resize", updateMobileAgendaPanel);
        window.addEventListener("scroll", updateScrollState, { passive: true });

      updateScrollState();

    async function shareInvite() {
      const shareUrl = "https://tonigrapci.github.io/fifa2026/";
      const title = "World Cup Schedule";
      const text = "Scan this QR code or open the World Cup schedule app.";
      const imagePath = "assets/fifa2026-invite.png";
      try {
        const response = await fetch(imagePath);
        const blob = await response.blob();
        const file = new File([blob], "fifa2026-invite.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ title, text, url: shareUrl, files: [file] });
          state.shareMessage = "Share sheet opened.";
        } else if (navigator.share) {
          await navigator.share({ title, text, url: shareUrl });
          state.shareMessage = "Share sheet opened.";
        } else {
          await navigator.clipboard.writeText(shareUrl);
          state.shareMessage = "Link copied. Open invite for the QR image.";
        }
      } catch (err) {
        try {
          await navigator.clipboard.writeText(shareUrl);
          state.shareMessage = "Link copied. Open invite for the QR image.";
        } catch {
          state.shareMessage = "Sharing is blocked here. Open invite and send the image manually.";
        }
      }
      render();
    }
    function toggleTests() { state.showTests = !state.showTests; render(); }
    function openEditor(id) { state.selectedId = id; render(); }
    function closeEditor() { state.selectedId = null; render(); }
    function calendarStart() { state.calendarDate = new Date("2026-06-12T12:00:00"); render(); }
    function moveCalendar(amount) {
      const next = new Date(state.calendarDate);
      if (state.view === "month") next.setMonth(next.getMonth() + amount);
      else next.setDate(next.getDate() + amount * 7);
      state.calendarDate = next; render();
    }

    function saveEditor(id) {
      const original = events().find(e => e.id === id);
      state.edits[id] = {
        date: original.date,
        time: original.time,
        venue: original.venue,
        notes: document.getElementById("editNotes").value || "",
        mustWatch: document.getElementById("editMustWatch").checked,
        watchStatus: document.getElementById("editWatchStatus").value
      };
      state.selectedId = null;
      persist();
      render();
    }

    function resetEvent(id) {
      delete state.edits[id];
      state.selectedId = null;
      persist();
      render();
    }

    function resetAll() {
      if (!confirm("Reset all edits, notes and statuses saved for this local app?")) return;
      state.edits = {};
      persist();
      render();
    }

    function getBackupPayload() {
      return JSON.stringify({
        app: "world-cup-calendar-local-html",
        version: 1,
        storageKey: STORAGE_KEY,
        exportedAt: new Date().toISOString(),
        edits: state.edits
      }, null, 2);
    }

    function exportBackup() {
      state.backupText = getBackupPayload();
      state.backupMessage = "Backup created below. Copy it into Notes, Google Drive, or a text file.";
      render();
    }

    async function copyBackup() {
      const text = state.backupText || getBackupPayload();
      state.backupText = text;
      try {
        await navigator.clipboard.writeText(text);
        state.backupMessage = "Backup copied to clipboard.";
      } catch {
        state.backupMessage = "Copy may be blocked locally. Select the backup text and copy it manually.";
      }
      render();
    }

    function closeBackupPanel() {
      state.backupText = "";
      state.importText = "";
      state.backupMessage = "";
      render();
    }

    function importBackupText() {
      try {
        const parsed = parseBackupPayload(state.importText || "{}");
        const importedEdits = parsed.edits && typeof parsed.edits === "object" ? parsed.edits : parsed;
        state.edits = importedEdits || {};
        persist();
        state.backupMessage = "Backup imported successfully.";
      } catch {
        state.backupMessage = "Could not import backup. Paste the full JSON backup text and try again.";
      }
      render();
    }

    function importBackupFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.importText = String(reader.result || "");
        try {
          const parsed = parseBackupPayload(state.importText || "{}");
          const importedEdits = parsed.edits && typeof parsed.edits === "object" ? parsed.edits : parsed;
          state.edits = importedEdits || {};
          persist();
          state.backupMessage = "Backup imported successfully.";
        } catch {
          state.backupMessage = "Could not import backup. Please choose a valid JSON backup file.";
        }
        render();
      };
      reader.readAsText(file);
    }

    function parseBackupPayload(text) {
      const raw = String(text || "").trim();
      try { return JSON.parse(raw || "{}"); } catch {}
      const start = raw.indexOf("{");
      const end = raw.lastIndexOf("}");
      if (start === -1 || end <= start) throw new Error("No JSON object found");
      return JSON.parse(raw.slice(start, end + 1));
    }

    render();
    refreshDailyScores();
  </script>
</body>
</html>
