<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#059669" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="World Cup" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="assets/app-icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <title>World Cup Sydney Calendar</title>
  <style>
    :root {
      --slate-950:#020617; --slate-900:#0f172a; --slate-700:#334155; --slate-600:#475569;
      --slate-500:#64748b; --slate-400:#94a3b8; --slate-300:#cbd5e1; --slate-200:#e2e8f0;
      --slate-100:#f1f5f9; --slate-50:#f8fafc; --white:#fff;
      --blue-50:#eff6ff; --blue-300:#93c5fd; --blue-600:#2563eb;
      --yellow-50:#fefce8; --yellow-300:#fde047;
      --green-50:#f0fdf4; --green-300:#86efac; --emerald-300:#6ee7b7; --emerald-600:#059669;
      --red-50:#fef2f2; --red-100:#fee2e2; --red-200:#fecaca; --red-400:#f87171; --red-600:#dc2626; --red-700:#b91c1c;
      --purple-100:#f3e8ff; --purple-700:#7e22ce;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--slate-100); color:var(--slate-900); }
    button, input, textarea, select { font: inherit; }
    button { cursor:pointer; }
    .page { min-height:100vh; padding:16px; }
    .wrap { max-width:1280px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
    .hero { background:var(--slate-950); color:white; border-radius:28px; padding:24px; box-shadow:0 18px 40px rgba(2,6,23,.18); }
    .hero-inner { display:flex; flex-direction:column; gap:16px; }
    .eyebrow { color:var(--emerald-300); font-size:14px; font-weight:700; letter-spacing:.25em; text-transform:uppercase; }
    h1 { margin:.25rem 0; font-size: clamp(2rem, 5vw, 3.5rem); line-height:1; }
    .hero p { color:var(--slate-300); max-width:760px; margin:.5rem 0 0; }
    .stats { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; text-align:center; }
    .stat { background:rgba(255,255,255,.1); border-radius:18px; padding:12px; }
    .stat .num { font-size:28px; font-weight:900; }
    .stat .lab { font-size:12px; color:var(--slate-300); }
    .toolbar { background:white; border:1px solid var(--slate-200); border-radius:28px; padding:16px; box-shadow:0 1px 6px rgba(15,23,42,.05); }
    .toolbar.sticky { position:sticky; top:12px; z-index:30; }
    .toolbar-summary { display:flex; align-items:center; justify-content:space-between; gap:12px; width:100%; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--slate-200); }
    .toolbar-summary-main { min-width:0; display:flex; align-items:center; gap:8px; }
    .toolbar-row { display:flex; flex-direction:column; gap:12px; }
    .searchbox { position:relative; width:100%; }
    .searchbox span { position:absolute; left:12px; top:9px; color:var(--slate-400); }
    input[type="search"], input[type="text"], input[type="date"], input[type="time"], textarea, select {
      width:100%; border:1px solid var(--slate-200); border-radius:14px; padding:10px 12px; outline:none; background:white;
    }
    input[type="search"] { padding-left:40px; }
    .controls { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .btn, .file-label { border:1px solid var(--slate-200); background:white; color:var(--slate-900); border-radius:16px; padding:9px 14px; font-weight:700; display:inline-flex; align-items:center; gap:8px; text-decoration:none; }
    .icon-btn { width:34px; height:34px; padding:0; justify-content:center; border-radius:999px; color:var(--slate-500); }
    .icon-btn:hover { color:var(--slate-950); border-color:var(--slate-300); }
    .btn.active { background:var(--slate-950); color:white; }
    .btn.primary { background:var(--slate-950); color:white; border-color:var(--slate-950); }
    .btn.green { background:var(--emerald-600); color:white; border-color:var(--emerald-600); }
    .legend { margin-top:14px; display:flex; flex-wrap:wrap; gap:12px; color:var(--slate-600); font-size:14px; }
    .swatch { display:inline-block; width:16px; height:16px; border-radius:4px; vertical-align:middle; margin-right:4px; border:1px solid var(--slate-200); }
    .backup { margin-top:14px; background:var(--slate-50); border:1px solid var(--slate-200); border-radius:18px; padding:14px; font-size:14px; }
    .backup textarea { width:100%; min-height:140px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; }
    .share-panel { margin-top:14px; background:var(--slate-50); color:var(--slate-900); border:1px solid var(--slate-200); border-radius:18px; padding:12px; display:grid; grid-template-columns:64px 1fr; gap:10px; align-items:center; }
    .share-panel img { width:64px; border-radius:12px; border:1px solid var(--slate-200); background:white; }
    .share-copy { min-width:0; }
    .share-copy strong { display:block; font-size:14px; }
    .share-copy span { display:block; color:var(--slate-600); font-size:12px; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .share-actions { margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; }
    .share-status { margin-top:8px; color:var(--emerald-600); font-size:13px; font-weight:800; }
    .grid2 { display:grid; grid-template-columns:1fr; gap:12px; }
    .hidden { display:none !important; }
    .event-row, .event-card, .mini { width:100%; text-align:left; border:1px solid var(--slate-200); border-radius:24px; padding:16px; box-shadow:0 1px 5px rgba(15,23,42,.05); transition:.15s ease; }
    .event-row:hover, .event-card:hover, .mini:hover { transform:translateY(-1px); box-shadow:0 8px 18px rgba(15,23,42,.08); }
    .event-row-inner { display:flex; flex-direction:column; gap:12px; justify-content:space-between; }
    .badges { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
    .badge { display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding:4px 8px; font-size:12px; font-weight:800; }
    .badge.dark { background:var(--slate-950); color:white; }
    .badge.light { background:var(--slate-100); color:var(--slate-700); }
    .badge.must { background:var(--red-100); color:var(--red-700); border:1px solid var(--red-200); }
    .badge.watched { background:var(--purple-100); color:var(--purple-700); }
    .badge.live { background:var(--red-100); color:var(--red-700); border:1px solid var(--red-200); }
    .badge.replay { background:var(--blue-50); color:var(--blue-600); border:1px solid var(--blue-300); }
    .badge.skip { background:var(--slate-200); color:var(--slate-700); border:1px solid var(--slate-300); }
    .event-title { margin:8px 0 4px; font-size:20px; font-weight:900; }
    .flag-title { display:flex; align-items:center; flex-wrap:wrap; gap:8px; }
    .team-flag { font-size:22px; line-height:1; filter:saturate(.95); }
    .flag-vs { color:var(--slate-500); font-size:14px; font-weight:900; text-transform:uppercase; }
    .meta { color:var(--slate-600); font-size:14px; }
    .notes { margin-top:10px; background:rgba(255,255,255,.7); border-radius:16px; padding:10px; color:var(--slate-700); }
    .big-time { font-size:28px; font-weight:900; text-align:right; }
    .bg-mustWatch { background:var(--red-50); border-color:var(--red-400); box-shadow:0 0 0 2px var(--red-200), 0 1px 5px rgba(15,23,42,.05); }
    .bg-weekend { background:var(--green-50); border-color:var(--green-300); }
    .bg-early { background:var(--blue-50); border-color:var(--blue-300); }
    .bg-morning { background:var(--yellow-50); border-color:var(--yellow-300); }
    .bg-other { background:white; border-color:var(--slate-200); }
    .day-block { background:white; border:1px solid var(--slate-200); border-radius:28px; overflow:hidden; box-shadow:0 1px 5px rgba(15,23,42,.05); }
    .day-head { background:var(--slate-950); color:white; padding:12px 20px; font-weight:900; }
    .day-grid { display:grid; grid-template-columns:1fr; gap:12px; padding:16px; }
    .cal-nav { display:flex; flex-direction:column; gap:12px; align-items:center; justify-content:space-between; background:white; border:1px solid var(--slate-200); border-radius:28px; padding:16px; box-shadow:0 1px 5px rgba(15,23,42,.05); }
    .cal-title { font-size:20px; font-weight:900; text-align:center; }
    .week { background:white; border:1px solid var(--slate-200); border-radius:28px; overflow:hidden; box-shadow:0 1px 5px rgba(15,23,42,.05); }
    .week-head, .month-head { display:grid; grid-template-columns:repeat(7,1fr); background:var(--slate-950); color:white; }
    .week-head > div, .month-head > div { padding:10px; text-align:center; font-weight:900; border-right:1px solid rgba(255,255,255,.1); }
    .week-grid { display:grid; grid-template-columns:1fr; }
    .week-day { min-height:180px; border-top:1px solid var(--slate-200); padding:8px; }
    .month { background:white; border:1px solid var(--slate-200); border-radius:28px; overflow:hidden; box-shadow:0 1px 5px rgba(15,23,42,.05); }
    .month-grid { display:grid; grid-template-columns:repeat(7,1fr); }
    .month-day { min-height:190px; border-top:1px solid var(--slate-200); border-right:1px solid var(--slate-200); padding:8px; overflow:hidden; }
    .month-day.muted { background:var(--slate-50); color:var(--slate-400); }
    .day-num { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .count-pill { background:var(--slate-100); color:var(--slate-600); border-radius:999px; padding:2px 8px; font-size:10px; font-weight:900; }
    .mini { border-radius:12px; padding:5px 7px; margin-bottom:4px; font-size:12px; box-shadow:none; }
    .mini-top { display:flex; align-items:center; justify-content:space-between; gap:4px; }
    .mini-time { font-size:11px; font-weight:900; white-space:nowrap; }
    .mini-title { font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .status-dot { display:inline-block; width:8px; height:8px; border-radius:999px; }
    .status-live { background:var(--red-600); }
    .status-replay { background:var(--blue-600); }
    .status-skip { background:var(--slate-500); }
    .star { color:var(--red-700); font-size:13px; }
    .modal { position:fixed; inset:0; z-index:80; background:rgba(2,6,23,.65); display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal-card { width:100%; max-width:720px; background:white; border-radius:28px; overflow:hidden; box-shadow:0 30px 80px rgba(2,6,23,.35); }
    .modal-head { background:var(--slate-950); color:white; padding:20px; }
    .modal-head .small { color:var(--emerald-300); letter-spacing:.2em; text-transform:uppercase; font-size:12px; font-weight:800; }
    .modal-head h2 { margin:4px 0 0; }
    .match-summary { background:var(--slate-50); border:1px solid var(--slate-200); border-radius:16px; padding:12px; color:var(--slate-700); }
    .match-summary strong { display:block; color:var(--slate-950); font-size:16px; }
    .match-summary span { display:block; margin-top:3px; font-size:13px; }
    .form { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:20px; }
    .span2 { grid-column: span 2; }
    label { font-size:14px; font-weight:800; }
    label > input, label > textarea, label > select { margin-top:6px; font-weight:400; }
    .checkrow { display:flex; align-items:center; gap:8px; }
    .modal-actions { background:var(--slate-50); padding:18px; display:flex; flex-direction:column-reverse; gap:8px; justify-content:space-between; }
    .right-actions { display:flex; gap:8px; justify-content:flex-end; }
    .empty { border:1px dashed var(--slate-300); border-radius:12px; color:var(--slate-400); padding:12px; font-size:12px; }
    .test-grid { display:grid; grid-template-columns:1fr; gap:8px; }
    .test-pass { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; border-radius:12px; padding:8px; }
    .test-fail { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; border-radius:12px; padding:8px; }
    @media (min-width: 768px) {
      .page { padding:32px; }
      .hero-inner { flex-direction:row; align-items:flex-end; justify-content:space-between; }
      .stats { grid-template-columns:repeat(4,1fr); min-width:420px; }
      .toolbar-row { flex-direction:row; align-items:center; justify-content:space-between; }
      .searchbox { max-width:420px; }
      .grid2 { grid-template-columns:repeat(2,1fr); }
      .day-grid { grid-template-columns:repeat(2,1fr); }
      .event-row-inner { flex-direction:row; align-items:center; }
      .week-grid { grid-template-columns:repeat(7,1fr); }
      .week-day { border-right:1px solid var(--slate-200); }
      .cal-nav { flex-direction:row; }
      .modal-actions { flex-direction:row; align-items:center; }
    }
    @media (min-width: 1100px) { .day-grid { grid-template-columns:repeat(3,1fr); } }
    @media (max-width: 700px) {
      .page { padding:12px; }
      .wrap { gap:14px; }
      .hero { border-radius:22px; padding:18px; }
      .toolbar.sticky { top:8px; border-radius:20px; padding:10px; }
      .toolbar-summary { gap:10px; margin-bottom:0; padding-bottom:0; border-bottom:0; }
      .toolbar-summary-text { min-width:0; color:var(--slate-600); font-size:13px; font-weight:800; line-height:1.25; }
      .toolbar-summary .btn { flex:0 0 auto; padding:8px 10px; border-radius:14px; }
      .controls { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); align-items:stretch; }
      .controls .btn, .controls .file-label, .controls select { width:100%; min-width:0; justify-content:center; }
      .legend { font-size:12px; gap:8px; }
      body.mobile-agenda-closed .hero,
      body.mobile-agenda-open .hero { display:none; }
      body.mobile-agenda-closed .toolbar.sticky { padding:8px 10px; border-radius:18px; }
      body.mobile-agenda-closed .toolbar.sticky .toolbar-row,
      body.mobile-agenda-closed .toolbar.sticky .legend,
      body.mobile-agenda-closed .toolbar.sticky .backup,
      body.mobile-agenda-closed .toolbar.sticky .share-panel { display:none; }
      body.mobile-agenda-open .toolbar.sticky { position:static; }
      body.mobile-agenda-open .toolbar-summary { margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--slate-200); }
      .share-panel { grid-template-columns:54px 1fr; padding:10px; }
      .share-panel img { width:54px; }
      .modal { align-items:flex-start; overflow:auto; padding:10px; }
      .modal-card { border-radius:20px; }
      .modal-head { padding:14px 16px; }
      .modal-head h2 { font-size:20px; line-height:1.1; }
      .form { gap:10px; padding:14px; }
      .modal-actions { padding:12px; }
      .month { overflow-x:auto; }
      .month-head, .month-grid { min-width:900px; }
      .week { overflow-x:auto; }
      .week-head, .week-grid { min-width:900px; }
    }
    body.agenda-filters-closed .toolbar.sticky { padding:10px 14px; border-radius:20px; }
    body.agenda-filters-closed .toolbar.sticky .toolbar-summary { margin-bottom:0; padding-bottom:0; border-bottom:0; }
    body.agenda-filters-closed .toolbar.sticky .toolbar-row,
    body.agenda-filters-closed .toolbar.sticky .legend,
    body.agenda-filters-closed .toolbar.sticky .backup,
    body.agenda-filters-closed .toolbar.sticky .share-panel { display:none; }
  </style>
</head>

          const key = dateKey(d);
          const evs = (by[key] || []).sort((a,b)=>minutes(a.time)-minutes(b.time));
          return `<div class="week-day"><div class="meta" style="margin-bottom:8px;font-weight:800;">${escapeHtml(dateLabel(key))}</div>${evs.length ? evs.map(e => renderMini(e)).join("") : '<div class="empty">No matches</div>'}</div>`;
        }).join("")}</div>
      </div>`;
    }

    function renderMonth(list) {
      const start = startOfMonthGrid(state.calendarDate);
      const days = Array.from({length:42}, (_,i) => addDays(start, i));
      const by = groupByDate(list);
      return `<div class="month">
        <div class="month-head">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => `<div>${d}</div>`).join("")}</div>
        <div class="month-grid">${days.map(d => {
          const key = dateKey(d);
          const evs = (by[key] || []).sort((a,b)=>minutes(a.time)-minutes(b.time));
          const muted = d.getMonth() !== state.calendarDate.getMonth();
          return `<div class="month-day ${muted ? "muted" : ""}"><div class="day-num"><strong>${d.getDate()}</strong>${evs.length ? `<span class="count-pill">${evs.length}</span>` : ""}</div>${evs.map(e => renderMini(e, true)).join("")}</div>`;
        }).join("")}</div>
      </div>`;
    }

    function renderEditor(e) {
      if (!e) return "";
      return `<div class="modal" role="dialog" aria-modal="true">
        <div class="modal-card">
          <div class="modal-head"><div class="small">Match #${e.id}</div><h2>${escapeHtml(matchTitle(e))}</h2></div>
          <div class="form">
            <div class="match-summary span2">
              <strong>${escapeHtml(e.stage)}</strong>
              <span>${teamWithFlag(e.home)} <span class="flag-vs">vs</span> ${teamWithFlag(e.away)}</span>
            </div>
            <label>Sydney date<input id="editDate" type="date" value="${escapeHtml(e.date || "")}"></label>
            <label>Sydney time<input id="editTime" type="time" value="${escapeHtml(e.time || "")}"></label>
            <label class="span2">Venue<input id="editVenue" type="text" value="${escapeHtml(e.venue || "")}"></label>
            <label class="span2">Notes<textarea id="editNotes" placeholder="Leave notes here...">${escapeHtml(e.notes || "")}</textarea></label>
            <label class="checkrow"><input id="editMustWatch" type="checkbox" ${e.mustWatch ? "checked" : ""}> Must watch</label>
            <label class="checkrow"><input id="editWatched" type="checkbox" ${e.watched ? "checked" : ""}> Watched</label>
          </div>
          <div class="modal-actions">
            <button class="btn" onclick="resetEvent(${e.id})">↺ Reset</button>
            <div class="right-actions"><button class="btn" onclick="closeEditor()">Cancel</button><button class="btn green" onclick="saveEditor(${e.id})">✓ Save</button></div>
          </div>
        </div>
      </div>`;
    }

    function renderMain(list) {
      let main = "";
      if (state.view === "agenda") main = renderAgenda(list);
      if (state.view === "days") main = renderDays(list);
      if (state.view === "week") main = renderCalendarNav() + renderWeek(list);
      if (state.view === "month") main = renderCalendarNav() + renderMonth(list);
      return main;
    }

    function updateToolbarCounts(list) {
      const counts = {
        shownCount: list.length,
        summaryCount: list.length,
        earlyCount: list.filter(e => colourGroup(e) === "early").length,
        morningCount: list.filter(e => colourGroup(e) === "morning").length,
        weekendCount: list.filter(e => colourGroup(e) === "weekend").length
      };
      Object.entries(counts).forEach(([id, value]) => {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
      });
    }

    function refreshFilteredView() {
      const list = filteredEvents();
      const results = document.getElementById("results");
      if (results) results.innerHTML = renderMain(list);
      updateToolbarCounts(list);
      updateMobileAgendaPanel();
    }

    function render() {
      const list = filteredEvents();
      const selected = state.selectedId ? events().find(e => e.id === state.selectedId) : null;
      document.getElementById("app").innerHTML = `<div class="page"><div class="wrap">${renderToolbar(list)}<main id="results">${renderMain(list)}</main></div>${renderEditor(selected)}</div>`;
      bindInputs();
      updateMobileAgendaPanel();
    }

    let mobileAgendaBound = false;
    function updateMobileAgendaPanel() {
      const isAgenda = state.view === "agenda";
      const isMobileAgenda = isAgenda && window.matchMedia("(max-width: 700px)").matches;
      document.body.classList.toggle("agenda-filters-closed", isAgenda && !state.mobileAgendaOpen);
      document.body.classList.toggle("agenda-filters-open", isAgenda && state.mobileAgendaOpen);
      document.body.classList.toggle("mobile-agenda-closed", isMobileAgenda && !state.mobileAgendaOpen);
      document.body.classList.toggle("mobile-agenda-open", isMobileAgenda && state.mobileAgendaOpen);
      if (!isAgenda) {
        document.body.classList.remove("agenda-filters-closed", "agenda-filters-open");
      }
      if (!isMobileAgenda) {
        document.body.classList.remove("mobile-agenda-closed", "mobile-agenda-open");
      }
      if (!mobileAgendaBound) {
        mobileAgendaBound = true;
        window.addEventListener("resize", updateMobileAgendaPanel);
      }
    }

    function bindInputs() {
      const search = document.getElementById("search");
      if (search) search.addEventListener("input", e => { state.query = e.target.value; refreshFilteredView(); });
      const importText = document.getElementById("importText");
      if (importText) importText.addEventListener("input", e => { state.importText = e.target.value; });
    }

    function setView(v) { state.view = v; render(); }
    function toggleMobileAgenda() {
      state.mobileAgendaOpen = !state.mobileAgendaOpen;
      render();
    }
    async function shareInvite() {
      const shareUrl = "https://tonigrapci.github.io/fifa2026/";
      const title = "World Cup Calendar";
      const text = "Scan this QR code or open the World Cup schedule app.";
      const imagePath = "assets/fifa2026-invite.png";
      try {
        const response = await fetch(imagePath);
        const blob = await response.blob();
        const file = new File([blob], "fifa2026-invite.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ title, text, url: shareUrl, files: [file] });
          state.shareMessage = "Share sheet opened.";
        } else if (navigator.share) {
          await navigator.share({ title, text, url: shareUrl });
          state.shareMessage = "Share sheet opened.";
        } else {
          await navigator.clipboard.writeText(shareUrl);
          state.shareMessage = "Link copied. Open invite for the QR image.";
        }
      } catch (err) {
        try {
          await navigator.clipboard.writeText(shareUrl);
          state.shareMessage = "Link copied. Open invite for the QR image.";
        } catch {
          state.shareMessage = "Sharing is blocked here. Open invite and send the image manually.";
        }
      }
      render();
    }
    function toggleTests() { state.showTests = !state.showTests; render(); }
    function openEditor(id) { state.selectedId = id; render(); }
    function closeEditor() { state.selectedId = null; render(); }
    function calendarStart() { state.calendarDate = new Date("2026-06-12T12:00:00"); render(); }
    function moveCalendar(amount) {
      const next = new Date(state.calendarDate);
      if (state.view === "month") next.setMonth(next.getMonth() + amount);
      else next.setDate(next.getDate() + amount * 7);
      state.calendarDate = next; render();
    }

    function saveEditor(id) {
      const original = events().find(e => e.id === id);
      state.edits[id] = {
        date: document.getElementById("editDate").value,
        time: document.getElementById("editTime").value,
        venue: document.getElementById("editVenue").value,
        notes: document.getElementById("editNotes").value || "",
        mustWatch: document.getElementById("editMustWatch").checked,
        watched: document.getElementById("editWatched").checked
      };
      state.selectedId = null;
      persist();
      render();
    }

    function resetEvent(id) {
      delete state.edits[id];
      state.selectedId = null;
      persist();
      render();
    }

    function resetAll() {
      if (!confirm("Reset all edits, notes and statuses saved for this local app?")) return;
      state.edits = {};
      persist();
      render();
    }

    function getBackupPayload() {
      return JSON.stringify({
        app: "world-cup-calendar-local-html",
        version: 1,
        storageKey: STORAGE_KEY,
        exportedAt: new Date().toISOString(),
        edits: state.edits
      }, null, 2);
    }

    function exportBackup() {
      state.backupText = getBackupPayload();
      state.backupMessage = "Backup created below. Copy it into Notes, Google Drive, or a text file.";
      render();
    }

    async function copyBackup() {
      const text = state.backupText || getBackupPayload();
      state.backupText = text;
      try {
        await navigator.clipboard.writeText(text);
        state.backupMessage = "Backup copied to clipboard.";
      } catch {
        state.backupMessage = "Copy may be blocked locally. Select the backup text and copy it manually.";
      }
      render();
    }

    function closeBackupPanel() {
      state.backupText = "";
      state.importText = "";
      state.backupMessage = "";
      render();
    }

    function importBackupText() {
      try {
        const parsed = JSON.parse(state.importText || "{}");
        const importedEdits = parsed.edits && typeof parsed.edits === "object" ? parsed.edits : parsed;
        state.edits = importedEdits || {};
        persist();
        state.backupMessage = "Backup imported successfully.";
      } catch {
        state.backupMessage = "Could not import backup. Paste the full JSON backup text and try again.";
      }
      render();
    }

    function importBackupFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.importText = String(reader.result || "");
        try {
          const parsed = JSON.parse(state.importText || "{}");
          const importedEdits = parsed.edits && typeof parsed.edits === "object" ? parsed.edits : parsed;
          state.edits = importedEdits || {};
          persist();
          state.backupMessage = "Backup imported successfully.";
        } catch {
          state.backupMessage = "Could not import backup. Please choose a valid JSON backup file.";
        }
        render();
      };
      reader.readAsText(file);
    }

    render();
  </script>
</body>
</html>
